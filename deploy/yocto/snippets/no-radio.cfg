# Kernel config fragment — strip WiFi and Bluetooth.
# Pair with no-radio.scc above.

# Wireless subsystem — strip everything
# CONFIG_WIRELESS is not set
# CONFIG_WLAN is not set
# CONFIG_CFG80211 is not set
# CONFIG_MAC80211 is not set

# Pi 5 BRCMFMAC (the chip-specific WiFi driver)
# CONFIG_BRCMFMAC is not set
# CONFIG_BRCMFMAC_SDIO is not set
# CONFIG_BRCMFMAC_PCIE is not set
# CONFIG_BRCMUTIL is not set

# Bluetooth subsystem
# CONFIG_BT is not set
# CONFIG_BT_BREDR is not set
# CONFIG_BT_LE is not set
# CONFIG_BT_HCIUART is not set
# CONFIG_BT_HCIUART_BCM is not set
# CONFIG_BT_BCM is not set
# CONFIG_BT_HCIBCM4377 is not set

# batman-adv L2 mesh — module + dependencies
CONFIG_BATMAN_ADV=m
CONFIG_BATMAN_ADV_BATMAN_V=y
CONFIG_BATMAN_ADV_BLA=y
CONFIG_BATMAN_ADV_DAT=y
CONFIG_BATMAN_ADV_NC=y
CONFIG_BATMAN_ADV_MCAST=y
# CRC16 and LIBCRC32C are pulled in automatically; explicit just in case
CONFIG_CRC16=y
CONFIG_LIBCRC32C=y

# ── Display ──────────────────────────────────────────────────────────────
# DRM/KMS + VC4 GPU — required for Weston/Chromium hardware rendering
CONFIG_DRM=y
CONFIG_DRM_VC4=y
CONFIG_DRM_PANEL_BRIDGE=y
# DSI panel drivers — Pi 7" original + Touch Display 2
CONFIG_DRM_PANEL_RASPBERRYPI_TOUCHSCREEN=y
CONFIG_DRM_PANEL_RASPBERRYPI_DSI=y
CONFIG_DRM_PANEL_ILITEK_ILI9881C=y

# ── Touch input ───────────────────────────────────────────────────────────
# Input subsystem core
CONFIG_INPUT=y
CONFIG_INPUT_TOUCHSCREEN=y
CONFIG_INPUT_EVDEV=y

# Pi Touch Display 2 — Goodix GT9xx (GT9110) capacitive touch over I2C
CONFIG_TOUCHSCREEN_GOODIX=y
CONFIG_TOUCHSCREEN_GOODIX_BERLIN_I2C=y

# Pi original 7" Touch Display — firmware-assisted touch via VideoCore
CONFIG_TOUCHSCREEN_RASPBERRYPI_FW=y

# FT5x06 family — used on some Pi DSI display variants
CONFIG_TOUCHSCREEN_EDT_FT5X06=y

# HID multitouch (USB or I2C-HID touch panels)
CONFIG_HID_MULTITOUCH=y
CONFIG_HID_GENERIC=y

# I2C bus — required for Goodix touch controller
CONFIG_I2C=y
CONFIG_I2C_BCM2835=y
CONFIG_I2C_MUX_PINCTRL=y

# ── USB ──────────────────────────────────────────────────────────────────
# Keep USB core + HID (keyboard / mouse) and gadget networking (usb0 for SSH)
CONFIG_USB=y
CONFIG_USB_HID=y
CONFIG_HID_GENERIC=y
CONFIG_USB_GADGET=y
CONFIG_USB_ETH=y
CONFIG_USB_ETH_RNDIS=y

# USB mass storage — enabled so pen drives can be mounted and browsed via the
# built-in file manager. The nftables firewall still blocks all WAN traffic so
# files cannot leave the LAN.
CONFIG_USB_STORAGE=y
CONFIG_USB_UAS=y

# Filesystem support for common USB drive formats
CONFIG_VFAT=y
CONFIG_FAT=y
CONFIG_EXFAT_FS=y
CONFIG_NTFS3_FS=y
CONFIG_ISO9660_FS=y

# Hardened defaults
CONFIG_RANDOMIZE_BASE=y
CONFIG_STACKPROTECTOR_STRONG=y
CONFIG_STRICT_KERNEL_RWX=y
CONFIG_SLAB_FREELIST_RANDOM=y
CONFIG_SHUFFLE_PAGE_ALLOCATOR=y
# CONFIG_KEXEC is not set
# CONFIG_HIBERNATION is not set
# CONFIG_PROC_KCORE is not set
# CONFIG_LEGACY_PTYS is not set
