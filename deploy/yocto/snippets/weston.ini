# CyberDeck Weston compositor config.
# Installed to /etc/xdg/weston/weston.ini by the Yocto recipe.

[core]
shell=kiosk-shell.so
backend=drm-backend.so
# Don't refuse to start if no input device is found at boot (headless safe)
require-input=false
idle-time=0

[shell]
background-color=0xff0a0e0f

# ── Outputs ────────────────────────────────────────────────────────────────
# weston enables ALL connected outputs automatically via DRM/KMS.
# These sections set preferred resolution but are not required for any single
# display type — works with DSI only, HDMI only, or both simultaneously.

[output]
name=DSI-1
mode=preferred
transform=normal

[output]
name=HDMI-A-1
mode=preferred
transform=normal

[output]
name=HDMI-A-2
mode=preferred
transform=normal

# ── Input ──────────────────────────────────────────────────────────────────
# libinput handles: USB mouse/keyboard, Pi DSI touchscreen, USB touch panels.
[libinput]
enable-tap=true
natural-scroll=false
touchscreen_calibrator=true

[input-method]
path=/usr/libexec/weston-keyboard

# ── Kiosk autolaunch ───────────────────────────────────────────────────────
# kiosk-shell runs this script fullscreen on every connected output.
# wait-for-web.sh is called inside start-kiosk.sh so Chromium never
# launches into a blank page.
[autolaunch]
path=/opt/cyberdeck/deploy/scripts/start-kiosk.sh
watch=false
