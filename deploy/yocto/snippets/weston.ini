# CyberDeck Weston compositor config.
# Installed to /etc/xdg/weston/weston.ini by the Yocto recipe.

[core]
shell=kiosk-shell.so
backend=drm-backend.so
# Don't refuse to start if no input device is found at boot (headless safe)
require-input=false
idle-time=0
vt-switching=true

[shell]
background-color=0xff0a0e0f
# Locks app window alignment strictly to fullscreen bounds
panel-position=none

# ── Outputs ────────────────────────────────────────────────────────────────
# Weston enables ALL connected outputs automatically via DRM/KMS.
# For multi-screen deployments, explicitly configure app scaling anchors.
[output]
name=DSI-1
mode=preferred
transform=normal

[output]
name=HDMI-A-1
mode=preferred
transform=normal

[output]
name=HDMI-A-2
mode=preferred
transform=normal

# ── Input ──────────────────────────────────────────────────────────────────
# libinput handles: USB mouse/keyboard, Pi DSI touchscreen, USB touch panels.
[libinput]
enable-tap=true
natural-scroll=false
touchscreen_calibrator=true

[input-method]
path=/usr/libexec/weston-keyboard

# ── Kiosk autolaunch ───────────────────────────────────────────────────────
# FIXED: Moved lock file out of root-only /run/lock/ and into world-writable /tmp/
# This ensures the unprivileged cyberdeck user can safely acquire the lock immediately on boot.
[autolaunch]
path=/usr/bin/flock -n /tmp/cyberdeck-kiosk.lock /opt/cyberdeck/deploy/scripts/start-kiosk.sh
watch=true
