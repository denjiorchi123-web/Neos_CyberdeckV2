<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyberDeck Mesh Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
    }
    .app { display: flex; height: 100vh; }
    .sidebar {
      width: 320px;
      min-width: 320px;
      background: #111111;
      border-right: 1px solid #1f1f1f;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #1f1f1f;
    }
    .sidebar-header h1 {
      font-size: 18px;
      color: #00ff88;
      margin-bottom: 4px;
    }
    .sidebar-header .user-line {
      font-size: 13px;
      color: #666;
    }
    .mesh-status {
      padding: 12px 16px;
      border-bottom: 1px solid #1f1f1f;
      font-size: 12px;
    }
    .mesh-status h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      margin-bottom: 8px;
    }
    .node-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
    }
    .dot.online { background: #00ff88; box-shadow: 0 0 6px #00ff8844; }
    .dot.offline { background: #ff4444; }
    .search-wrap { padding: 10px 16px; }
    .search-wrap input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 12px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
    }
    .search-wrap input:focus { border-color: #00ff88; }
    .section-label {
      padding: 8px 16px 4px;
      font-size: 11px;
      text-transform: uppercase;
      color: #666;
      letter-spacing: 0.06em;
    }
    .chat-list, .contact-list {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 12px;
    }
    .list-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid #161616;
      transition: background 0.15s;
    }
    .list-item:hover, .list-item.active { background: #1a1a1a; }
    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #005c4b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: #fff;
      flex-shrink: 0;
    }
    .avatar.remote { background: #333; }
    .item-body { min-width: 0; flex: 1; }
    .item-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }
    .item-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-time { font-size: 11px; color: #666; flex-shrink: 0; }
    .item-preview {
      font-size: 13px;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0a0a0a;
    }
    .center-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #666;
      padding: 24px;
      text-align: center;
    }
    .login-box {
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 360px;
    }
    .login-box h2 { color: #00ff88; margin-bottom: 8px; }
    .login-box p { font-size: 14px; margin-bottom: 20px; color: #666; }
    .login-box input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 15px;
      margin-bottom: 16px;
      outline: none;
    }
    .login-box input:focus { border-color: #00ff88; }
    .btn {
      background: #005c4b;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    .btn:hover { background: #007a62; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid #1f1f1f;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #111;
    }
    .chat-header .title { font-size: 16px; font-weight: 600; }
    .chat-header .subtitle { font-size: 12px; color: #666; }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg-row { display: flex; flex-direction: column; max-width: 70%; }
    .msg-row.sent { align-self: flex-end; align-items: flex-end; }
    .msg-row.received { align-self: flex-start; align-items: flex-start; }
    .msg-meta { font-size: 11px; color: #666; margin-bottom: 4px; }
    .bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
    }
    .bubble.sent { background: #005c4b; color: #fff; border-bottom-right-radius: 4px; }
    .bubble.received { background: #1a1a1a; color: #e0e0e0; border-bottom-left-radius: 4px; }
    .composer {
      padding: 14px 20px;
      border-top: 1px solid #1f1f1f;
      display: flex;
      gap: 10px;
      background: #111;
    }
    .composer input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 24px;
      padding: 12px 18px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
    }
    .composer input:focus { border-color: #00ff88; }
    .composer .btn { width: auto; padding: 12px 24px; border-radius: 24px; }
    .hidden { display: none !important; }
    .badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: #222;
      color: #888;
      margin-left: 6px;
    }
    .empty-note { padding: 16px; color: #555; font-size: 13px; text-align: center; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>CyberDeck Mesh</h1>
        <div class="user-line" id="loggedInLine">Not logged in</div>
      </div>
      <div class="mesh-status">
        <h3>Mesh Nodes</h3>
        <div id="nodeList"></div>
      </div>
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Search contacts or chats..." />
      </div>
      <div class="section-label">Contacts</div>
      <div class="contact-list" id="contactList"></div>
      <div class="section-label">Chats</div>
      <div class="chat-list" id="chatList"></div>
    </aside>

    <main class="main" id="mainPanel">
      <div class="center-panel" id="loginPanel">
        <div class="login-box">
          <h2>Join Network</h2>
          <p>Enter a username to join the LAN mesh. No password required.</p>
          <input type="text" id="usernameInput" placeholder="Your username" maxlength="32" />
          <button class="btn" id="joinBtn">Join Network</button>
        </div>
      </div>

      <div class="center-panel hidden" id="emptyPanel">
        <p>Select a contact or chat to start messaging</p>
      </div>

      <div class="hidden" id="chatPanel" style="display:flex;flex-direction:column;height:100%;">
        <div class="chat-header">
          <div class="avatar" id="chatAvatar">?</div>
          <div>
            <div class="title" id="chatTitle">Chat</div>
            <div class="subtitle" id="chatSubtitle">offline</div>
          </div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="composer">
          <input type="text" id="messageInput" placeholder="Type a message..." />
          <button class="btn" id="sendBtn">Send</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const state = {
      user: null,
      users: [],
      chats: [],
      nodes: [],
      activeChat: null,
      activeChatMembers: [],
      localNodeId: null,
      search: "",
    };

    const socket = io();
    const els = {
      loggedInLine: document.getElementById("loggedInLine"),
      nodeList: document.getElementById("nodeList"),
      contactList: document.getElementById("contactList"),
      chatList: document.getElementById("chatList"),
      loginPanel: document.getElementById("loginPanel"),
      emptyPanel: document.getElementById("emptyPanel"),
      chatPanel: document.getElementById("chatPanel"),
      usernameInput: document.getElementById("usernameInput"),
      joinBtn: document.getElementById("joinBtn"),
      searchInput: document.getElementById("searchInput"),
      chatAvatar: document.getElementById("chatAvatar"),
      chatTitle: document.getElementById("chatTitle"),
      chatSubtitle: document.getElementById("chatSubtitle"),
      messages: document.getElementById("messages"),
      messageInput: document.getElementById("messageInput"),
      sendBtn: document.getElementById("sendBtn"),
    };

    function initials(name) {
      return (name || "?").slice(0, 2).toUpperCase();
    }

    function formatTime(ts) {
      if (!ts) return "";
      const d = new Date(ts);
      const now = new Date();
      const sameDay = d.toDateString() === now.toDateString();
      if (sameDay) return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      return d.toLocaleDateString([], { month: "short", day: "numeric" });
    }

    function showPanel(name) {
      els.loginPanel.classList.toggle("hidden", name !== "login");
      els.emptyPanel.classList.toggle("hidden", name !== "empty");
      els.chatPanel.classList.toggle("hidden", name !== "chat");
    }

    async function api(path, options) {
      const res = await fetch(path, {
        headers: { "Content-Type": "application/json" },
        ...options,
      });
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    async function refreshNodes() {
      const data = await api("/api/nodes");
      state.nodes = data.nodes || [];
      state.localNodeId = data.localNodeId;
      renderNodes();
    }

    async function refreshUsers() {
      const data = await api("/api/users");
      state.users = data.users || [];
      state.localNodeId = data.localNodeId;
      renderContacts();
    }

    async function refreshChats() {
      if (!state.user) return;
      const data = await api(`/api/chats?userId=${encodeURIComponent(state.user.id)}`);
      state.chats = data.chats || [];
      renderChats();
    }

    function renderNodes() {
      els.nodeList.innerHTML = "";
      if (!state.nodes.length) {
        els.nodeList.innerHTML = '<div class="empty-note">No nodes discovered yet</div>';
        return;
      }
      for (const node of state.nodes) {
        const row = document.createElement("div");
        row.className = "node-row";
        row.innerHTML = `
          <span class="dot ${node.isOnline ? "online" : "offline"}"></span>
          <span>${node.name} (${node.id})</span>
        `;
        els.nodeList.appendChild(row);
      }
    }

    function filteredUsers() {
      const q = state.search.toLowerCase();
      return state.users.filter((u) => {
        if (state.user && u.id === state.user.id) return false;
        if (!q) return true;
        return u.displayName.toLowerCase().includes(q) || u.username.toLowerCase().includes(q);
      });
    }

    function filteredChats() {
      const q = state.search.toLowerCase();
      return state.chats.filter((c) => {
        if (!q) return true;
        return (c.name || "").toLowerCase().includes(q);
      });
    }

    function renderContacts() {
      els.contactList.innerHTML = "";
      const users = filteredUsers();
      if (!users.length) {
        els.contactList.innerHTML = '<div class="empty-note">No contacts yet</div>';
        return;
      }
      for (const user of users) {
        const item = document.createElement("div");
        item.className = "list-item";
        item.innerHTML = `
          <div class="avatar ${user.isLocal ? "" : "remote"}">${initials(user.displayName)}</div>
          <div class="item-body">
            <div class="item-top">
              <span class="item-name">${user.displayName}</span>
              <span class="badge">${user.nodeId}</span>
            </div>
            <div class="item-preview">@${user.username} · ${user.status}</div>
          </div>
        `;
        item.onclick = () => openDmWithUser(user);
        els.contactList.appendChild(item);
      }
    }

    function renderChats() {
      els.chatList.innerHTML = "";
      const chats = filteredChats();
      if (!chats.length) {
        els.chatList.innerHTML = '<div class="empty-note">No chats yet</div>';
        return;
      }
      for (const chat of chats) {
        const item = document.createElement("div");
        item.className = "list-item" + (state.activeChat && state.activeChat.id === chat.id ? " active" : "");
        item.innerHTML = `
          <div class="avatar">${initials(chat.name)}</div>
          <div class="item-body">
            <div class="item-top">
              <span class="item-name">${chat.name || "Chat"}</span>
              <span class="item-time">${formatTime(chat.lastMessageAt)}</span>
            </div>
            <div class="item-preview">${chat.lastMessage || "No messages yet"}</div>
          </div>
        `;
        item.onclick = () => openChat(chat);
        els.chatList.appendChild(item);
      }
    }

    async function openDmWithUser(user) {
      if (!state.user) return;
      const data = await api("/api/chats", {
        method: "POST",
        body: JSON.stringify({ type: "dm", userId: state.user.id, memberId: user.id }),
      });
      await refreshChats();
      openChat(data.chat, user);
    }

    async function openChat(chat, peerUser) {
      state.activeChat = chat;
      renderChats();

      const title = chat.name || (peerUser ? peerUser.displayName : "Chat");
      els.chatTitle.textContent = title;
      els.chatAvatar.textContent = initials(title);

      const peerNode = peerUser
        ? state.nodes.find((n) => n.id === peerUser.nodeId)
        : state.nodes.find((n) => n.id !== state.localNodeId);
      els.chatSubtitle.textContent = peerNode
        ? (peerNode.isOnline ? "online" : "offline")
        : "mesh";

      showPanel("chat");
      await loadMessages(chat.id);
    }

    async function loadMessages(chatId) {
      const data = await api(`/api/messages/${chatId}`);
      els.messages.innerHTML = "";
      for (const msg of data.messages) {
        appendMessage(msg, false);
      }
      els.messages.scrollTop = els.messages.scrollHeight;
    }

    function appendMessage(msg, scroll = true) {
      if (state.activeChat && msg.chatId !== state.activeChat.id) return;

      const sent = state.user && msg.senderId === state.user.id;
      const row = document.createElement("div");
      row.className = `msg-row ${sent ? "sent" : "received"}`;
      row.innerHTML = `
        <div class="msg-meta">${msg.senderName || "User"} · ${formatTime(msg.sentAt)}</div>
        <div class="bubble ${sent ? "sent" : "received"}">${escapeHtml(msg.content)}</div>
      `;
      els.messages.appendChild(row);
      if (scroll) els.messages.scrollTop = els.messages.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    async function sendMessage() {
      const content = els.messageInput.value.trim();
      if (!content || !state.user || !state.activeChat) return;

      els.messageInput.value = "";
      socket.emit("message:send", {
        chatId: state.activeChat.id,
        senderId: state.user.id,
        content,
      });
    }

    els.joinBtn.onclick = async () => {
      const username = els.usernameInput.value.trim();
      if (!username) return;
      els.joinBtn.disabled = true;
      try {
        const data = await api("/api/users/login", {
          method: "POST",
          body: JSON.stringify({ username }),
        });
        state.user = data.user;
        els.loggedInLine.textContent = `Logged in as ${state.user.displayName}`;
        socket.emit("user:login", { userId: state.user.id });
        showPanel("empty");
        await refreshUsers();
        await refreshChats();
        await refreshNodes();
      } catch (err) {
        alert("Login failed: " + err.message);
      } finally {
        els.joinBtn.disabled = false;
      }
    };

    els.usernameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") els.joinBtn.click();
    });

    els.sendBtn.onclick = sendMessage;
    els.messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    els.searchInput.addEventListener("input", (e) => {
      state.search = e.target.value;
      renderContacts();
      renderChats();
    });

    socket.on("message:received", (msg) => {
      if (state.activeChat && msg.chatId === state.activeChat.id) {
        appendMessage(msg);
      }
      refreshChats();
    });

    socket.on("user:appeared", () => {
      refreshUsers();
    });

    socket.on("node:online", () => {
      refreshNodes();
      if (state.activeChat) {
        els.chatSubtitle.textContent = "online";
      }
    });

    socket.on("node:offline", () => {
      refreshNodes();
      if (state.activeChat) {
        els.chatSubtitle.textContent = "offline";
      }
    });

    setInterval(refreshNodes, 8000);

    refreshNodes();
  </script>
</body>
</html>
